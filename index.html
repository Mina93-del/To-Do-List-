<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/to-do-list.css">
    <link rel="icon" type="image/x-icon"
        href="/img/to-do-list-icon-with-check-mark-notepad-checklist-vector-45067207.avif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
</head>

<body>
    <div class="landing">
        <div class="header">
            <div class="container">
                <div class="logo">
                    <div class="icon"><i class="fa-solid fa-check"></i></div>
                    <div class="title">
                        <h1>MY TO-DO-LIST</h1>
                    </div>
                </div>
                <div class="add-task-icon">
                    <a href="#">
                        <span class="icon"> <i class="fa-solid fa-plus"></i> </span>
                        <span class="text">Add Task</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="adding" id="adding">
            <div class="container">
                <div class="title">
                    <p>What's on Your Agenda Today?</p>
                </div>
                <form action="">
                    <input id="my-task" type="text" placeholder="Enter A New Task..">
                    <input id="submit" type="submit" value="Add">
                </form>
            </div>
        </div>
        <div class="all-tasks" id="all-tasks">
            <div class="container">
                <h1>all Tasks</h1>
                <div class="boxes">
                </div>

            </div>

            <div class="pending-tasks" id="pinding-tasks">
                <div class="container">
                    <h1>Pending Tasks</h1>
                    <div class="boxes">

                    </div>

                </div>
            </div>
            <div class="completed-tasks" id="completed-tasks">
                <div class="container">
                    <h1>Completed Tasks</h1>
                    <div class="boxes">

                    </div>
                </div>
            </div>
            <div class="modal hidden">
                <div class="modal-content">
                    <h3>Edit Task</h3>
                    <input type="text" id="editInput">
                    <div class="buttons">
                        <button id="save">Save</button>
                        <button id="cancel">Cancel</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    </div>
    <script src="miain.js"></script>

</body>

</html>
